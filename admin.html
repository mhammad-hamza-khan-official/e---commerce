<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="./assets/Css/admin.css">
    <link rel="stylesheet" href="./assets/Css/utilaty.css">
</head>

<body>
    <!--Alert section -->
    <!-- Delete popPop-->
    <div class="popPop-delete">
        <div class="overlay"></div>
        <div class="pop-container d-flex flex-column">
            <div class="text">
                <p>Are you sure</p>
            </div>
            <div class="btn d-flex">
                <button id="pCancle-btn" class="cancle">Cancle</button>
                <button class="delete" id="pDelete-btn">Delete</button>
            </div>
        </div>
    </div>

    <!-- ---------------------------- -->
    <header>
        <div class="logo">
            <p>Shop.co</p>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Listed</a></li>
                <li><a href="#">Info</a></li>
            </ul>
        </nav>
    </header>

    <div class="container ">


        <div class="sidebar">
            <ul>
                <li>Dashboard</li>
                <li>Product</li>
                <li>Shopping</li>
                <li>Analytics</li>
            </ul>
        </div>

        <main class="relative">
        <div class="Alert absolute  l-0 r-0 d-flex justify-center align-center" id="Empty-alert">
            <p>Fill The Feilds</p>
        </div>
            <div class="dashboard">
                <h1>Dashboard</h1>

                <!-- Add Product Section -->
                <div class="add-product">
                    <h2>Add Product</h2>

                    <!-- Checkbox + Label Toggle -->
                    <input type="checkbox" id="ADD">
                    <label for="ADD" class="add-product-btn">Add Product</label>

                    <!-- Hidden Inputs -->
                    <div class="input-contain">
                        <div class="name">
                            <span>Product Name</span>
                            <input type="text" placeholder="Enter Product Name" id="pName">
                        </div>

                        <div class="price">
                            <span>Price</span>
                            <input type="number" placeholder="Enter Price" id="pPrice">
                        </div>
                        <div class="rating">
                            <span>Rating</span>
                            <input type="text" maxlength="1" placeholder="Enter 1 digit" id="pRating">
                            <p id="errorRating" class="error">Rating must be less then 5</p>

                        </div>

                        <div class="img">
                            <span>Image</span>
                            <input type="file" id="fileInput pImage" accept=".jpg,.jpeg,.png,.gif" hidden>
                            <div class="d-flex flex-row align-center justify-between">
                                <label for="fileInput pImage">Upload Image</label>
                                <p class="size">300px x 250px</p>
                            </div>
                            <button id="pDone">Done</button>
                        </div>
                    </div>
                </div>
                <div class="product-container">
                    <div class="heading">
                        <h1>Products</h1>
                    </div>
                    <div class="container" id="overflow-product">


                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="./JavaScript/admin.js"></script>
</body>

</html>
