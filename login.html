<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./assets/Css/login.css">
    <link rel="stylesheet" href="./assets/Css/utilaty.css">
</head>
<body>
    <div class="container d-flex">
        <!-- right login card -->
        <div class="left-side d-flex justify-center align-center flex-column">
            <div class="back self-start">
                <a href="#">
                    <p>
                        Home
                    </p>
                </a>
            </div>
            <div class="login-card d-flex flex-column" id="Admin">
                <h1>Login as Admin</h1>
                <form action="" method="post" class="d-flex flex-column">
                    Name
                    <input type="text" name="" id="" required>
                    Email
                    <input type="email" name="" id="" required>
                    Phone number
                    <input type="password" name="" id="" required>
                    <input type="submit" value="Submit">
                </form>
                <div class="or">
                    <span>OR</span>
                </div>
                <div class="btn d-flex align-center justify-center">
                    <a href="#">
                    </a>    
    
                    <div class="icon"><img src="./assets/icon/User.svg" alt="">
                    </div>
                    <p>
                        Login As User
                    </p>
                </div>
            </div>
        </div>
        <!-- left img -->
        <div class="right-side">
            <div class="overlay"></div>
        </div>
    </div>
</body>
</html>
