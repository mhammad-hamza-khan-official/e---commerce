<!DOCTYPE html>

                    </a>
                </div>
                <div class="or">
                    <span>OR</span>
                </div>
                <div class="admin btn d-flex justify-center align-center">

                </div>
            </div>

    </div>

            </div>

                <div class="login-btn d-flex align-center">
                    <button type="button" id="pop-login-btn">Login</button>

                    <img src="./assets/icon/search.svg" alt="" class="search-icon">

                    <img src="./assets/icon/hamberger.svg" alt="" class="hamberger-icon">
